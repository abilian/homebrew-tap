image: ubuntu/lts
packages:
  - build-essential
  - curl
  - file
  - git
  - procps
sources:
  - https://git.sr.ht/~abilian/homebrew-tap
environment:
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_ANALYTICS: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  NONINTERACTIVE: "1"
tasks:
  - install-brew: |
      /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      # Sourcehut auto-sources ~/.buildenv before every subsequent task.
      echo 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"' >> ~/.buildenv
  - check: |
      cd ~/homebrew-tap
      make check
  # `make all` additionally builds every formula from source (cryptography,
  # pynacl, pillow, cairo, ...). That is slow and is intended to be run
  # locally; uncomment the task below to also exercise it in CI.
  # - build:
  #     cd ~/homebrew-tap
  #     make build
